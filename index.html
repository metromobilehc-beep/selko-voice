<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Selko Voice — Patient Communication Board</title>
<style>
  :root{
    --bg: #F7F5F1;
    --ink: #1F2D2E;
    --ink-soft: #4A5657;
    --card-bg: #FFFFFF;
    --border: #E3DFD6;

    --pain: #C0392B;
    --pain-dark: #97281D;
    --no: #8A4A3E;
    --no-dark: #6E3A30;
    --yes: #2F6F4E;
    --yes-dark: #24583D;
    --help: #B8863B;
    --help-dark: #93691F;

    --needs: #2B6777;
    --therapy: #45568C;
    --feelings: #A87C2E;
    --people: #3F7050;
    --phrases: #5C5449;
    --comfort: #5E7A9E;
    --speech: #6E5A8C;
    --core: #7A6A4F;
    --swallow: #8C5A6E;
    --worksheets: #4E6B5C;

    --radius: 18px;
    --font-scale: 1;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  button { font-family: inherit; }

  /* ---------- Top: Spoken bubble ---------- */
  .spoken-bar {
    position: sticky; top: 0; z-index: 20;
    background: var(--ink);
    color: #fff;
    padding: calc(14px * var(--font-scale)) calc(18px * var(--font-scale));
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 64px;
  }
  .spoken-bar .label {
    font-size: calc(13px * var(--font-scale));
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.6;
    white-space: nowrap;
  }
  .spoken-bar .text {
    font-size: calc(28px * var(--font-scale));
    font-weight: 700;
    flex: 1;
    overflow-wrap: anywhere;
  }
  .spoken-bar .replay {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    border-radius: 12px;
    width: 48px; height: 48px;
    font-size: 22px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .spoken-bar .replay:active { background: rgba(255,255,255,0.3); }

  /* ---------- Quick access strip ---------- */
  .quick-strip {
    position: sticky; top: calc(64px);
    z-index: 19;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .quick-btn {
    border: none;
    border-radius: 14px;
    padding: calc(12px * var(--font-scale)) 4px;
    font-size: calc(16px * var(--font-scale));
    font-weight: 700;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    min-height: 64px;
    justify-content: center;
  }
  .quick-btn .icon { font-size: calc(24px * var(--font-scale)); }
  .quick-btn.yes { background: var(--yes); }
  .quick-btn.yes:active { background: var(--yes-dark); }
  .quick-btn.no { background: var(--no); }
  .quick-btn.no:active { background: var(--no-dark); }
  .quick-btn.pain { background: var(--pain); }
  .quick-btn.pain:active { background: var(--pain-dark); }
  .quick-btn.help { background: var(--help); }
  .quick-btn.help:active { background: var(--help-dark); }

  /* ---------- Header row: back + title + text size ---------- */
  .header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 4px;
  }
  .back-btn {
    border: 1px solid var(--border);
    background: var(--card-bg);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: calc(16px * var(--font-scale));
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    display: none;
  }
  .back-btn.visible { display: inline-flex; align-items: center; gap: 6px; }
  .screen-title {
    font-size: calc(20px * var(--font-scale));
    font-weight: 700;
    flex: 1;
  }
  .size-toggle {
    display: flex;
    gap: 4px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }
  .size-toggle button {
    border: none;
    background: transparent;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .size-toggle button.active {
    background: var(--ink);
    color: #fff;
  }

  .discipline-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px 8px;
    flex-wrap: wrap;
  }
  .discipline-row label {
    font-size: calc(13px * var(--font-scale));
    font-weight: 700;
    color: var(--ink-soft);
  }
  .discipline-row select {
    flex: 1;
    min-width: 160px;
    max-width: 320px;
    font-size: calc(14px * var(--font-scale));
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--ink);
  }

  /* ---------- Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 10px 16px 32px;
  }
  @media (min-width: 640px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 960px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .tile {
    border: none;
    border-radius: var(--radius);
    background: var(--card-bg);
    border: 2px solid var(--border);
    padding: calc(18px * var(--font-scale)) 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    min-height: 110px;
    justify-content: center;
    text-align: center;
  }
  .tile:active { transform: scale(0.97); }
  .tile .icon { font-size: calc(34px * var(--font-scale)); line-height: 1; }
  .tile .name { font-size: calc(16px * var(--font-scale)); font-weight: 700; line-height: 1.2; }

  .cat-tile { color: #fff; border: none; }
  .cat-tile .name { color: #fff; }
  .cat-tile.needs { background: var(--needs); }
  .cat-tile.therapy { background: var(--therapy); }
  .cat-tile.feelings { background: var(--feelings); }
  .cat-tile.people { background: var(--people); }
  .cat-tile.phrases { background: var(--phrases); }
  .cat-tile.comfort { background: var(--comfort); }
  .cat-tile.pain-body { background: var(--pain); }
  .cat-tile.speech { background: var(--speech); }
  .cat-tile.core { background: var(--core); }
  .cat-tile.swallow { background: var(--swallow); }
  .cat-tile.worksheets { background: var(--worksheets); }
  .cat-tile.spell { background: var(--ink); }

  /* ---------- Spelling keyboard ---------- */
  .spell-preview {
    margin: 0 16px 10px;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: calc(16px * var(--font-scale));
    font-size: calc(30px * var(--font-scale));
    font-weight: 700;
    min-height: calc(48px * var(--font-scale));
    overflow-wrap: anywhere;
    color: var(--ink);
  }
  .spell-preview.empty { color: var(--ink-soft); font-weight: 500; }
  .spell-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 0 16px 14px;
  }
  .spell-actions button {
    border: none;
    border-radius: 12px;
    padding: calc(12px * var(--font-scale)) 6px;
    font-size: calc(15px * var(--font-scale));
    font-weight: 700;
    color: #fff;
    cursor: pointer;
  }
  .spell-actions .speak-word { background: var(--yes); }
  .spell-actions .space-word { background: var(--needs); }
  .spell-actions .clear-word { background: var(--pain); }
  .keyboard-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    padding: 0 16px 20px;
  }
  @media (min-width: 640px) {
    .keyboard-grid { grid-template-columns: repeat(9, 1fr); }
  }
  .key-btn {
    border: 2px solid var(--border);
    background: var(--card-bg);
    border-radius: 12px;
    padding: calc(14px * var(--font-scale)) 0;
    font-size: calc(20px * var(--font-scale));
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
  }
  .key-btn:active { transform: scale(0.95); background: var(--border); }
  .key-btn.backspace { background: var(--no); color: #fff; border: none; font-size: calc(16px * var(--font-scale)); }

  /* ---------- Worksheet card viewer ---------- */
  .ws-wrap { padding: 4px 16px 32px; }
  .ws-progress {
    font-size: calc(14px * var(--font-scale));
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .ws-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: calc(36px * var(--font-scale)) calc(20px * var(--font-scale));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
    margin-bottom: 14px;
  }
  .ws-text {
    font-size: calc(34px * var(--font-scale));
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }
  .ws-speak {
    border: none;
    background: var(--worksheets);
    color: #fff;
    border-radius: 12px;
    padding: calc(10px * var(--font-scale)) calc(20px * var(--font-scale));
    font-size: calc(16px * var(--font-scale));
    font-weight: 700;
    cursor: pointer;
  }
  .ws-score-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ws-score-row button {
    border: none;
    border-radius: 12px;
    padding: calc(14px * var(--font-scale)) 6px;
    font-size: calc(16px * var(--font-scale));
    font-weight: 700;
    color: #fff;
    cursor: pointer;
  }
  .ws-correct { background: var(--yes); }
  .ws-retry { background: var(--help); }
  .ws-nav-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .ws-nav-btn {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--ink);
    border-radius: 12px;
    padding: calc(12px * var(--font-scale)) 4px;
    font-size: calc(15px * var(--font-scale));
    font-weight: 700;
    cursor: pointer;
  }
  .ws-nav-btn:active { background: var(--border); }

  .section-note {
    padding: 4px 16px 0;
    font-size: calc(14px * var(--font-scale));
    color: var(--ink-soft);
  }

  /* focus visibility for keyboard/switch access */
  button:focus-visible {
    outline: 3px solid #2B6777;
    outline-offset: 2px;
  }

  .footer-note {
    text-align: center;
    color: var(--ink-soft);
    font-size: 12px;
    padding: 6px 16px 20px;
  }
</style>
</head>
<body>

<div class="spoken-bar">
  <span class="label">Said</span>
  <span class="text" id="spokenText">Tap anything to begin</span>
  <button class="replay" id="replayBtn" aria-label="Repeat last phrase">🔊</button>
</div>

<div class="quick-strip">
  <button class="quick-btn yes" onclick="speak('Yes')"><span class="icon">👍</span>Yes</button>
  <button class="quick-btn no" onclick="speak('No')"><span class="icon">👎</span>No</button>
  <button class="quick-btn pain" onclick="showScreen('pain-body')"><span class="icon">⚠️</span>Pain</button>
  <button class="quick-btn help" onclick="speak('I need staff to come here, please')"><span class="icon">🖐️</span>Help</button>
</div>

<div class="header-row">
  <button class="back-btn" id="backBtn" onclick="goBack()">← Back</button>
  <div class="screen-title" id="screenTitle">Choose a topic</div>
  <div class="size-toggle">
    <button data-size="1" onclick="setFontScale(1)">A</button>
    <button data-size="1.25" onclick="setFontScale(1.25)">A+</button>
    <button data-size="1.55" onclick="setFontScale(1.55)">A++</button>
  </div>
</div>

<div class="discipline-row" id="disciplineRow">
  <label for="disciplineSelect">Show topics for</label>
  <select id="disciplineSelect">
    <option value="all">All disciplines</option>
    <option value="pt">Physical Therapy</option>
    <option value="ot">Occupational Therapy</option>
    <option value="slp">Speech-Language Pathology</option>
  </select>
</div>



<div id="app"></div>

<div class="footer-note">Selko Voice · works without internet · a Selko module</div>

function renderWorksheetScreen(id) {

let speakWatchdog = null;
let resumeInterval = null;

function speak(text) {
  lastSpoken = text;
  document.getElementById('spokenText').textContent = text;

  try {
    const synth = window.speechSynthesis;

    // Clear any stuck timers from a previous jammed utterance
    if (speakWatchdog) clearTimeout(speakWatchdog);
    if (resumeInterval) clearInterval(resumeInterval);

    // Force-clear the queue. On some Android tablets, calling speak()
    // immediately after cancel() races and the queue jams, so give it
    // a beat before queuing the new utterance.
    synth.cancel();

    setTimeout(() => {
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95;
      const chosen = getSelectedVoice();
      if (chosen) utter.voice = chosen;

      utter.onend = () => {
        if (speakWatchdog) clearTimeout(speakWatchdog);
        if (resumeInterval) clearInterval(resumeInterval);
      };
      utter.onerror = () => {
        if (speakWatchdog) clearTimeout(speakWatchdog);
        if (resumeInterval) clearInterval(resumeInterval);
      };

      synth.speak(utter);

      // Chrome/WebView bug: speech can silently pause after ~15s and
      // never resume. Nudge it periodically while this utterance is active.
      resumeInterval = setInterval(() => {
        if (synth.speaking) { synth.pause(); synth.resume(); }
      }, 8000);

      // Watchdog: if nothing fires 'end' within 12s (this app's phrases
      // are all short), assume the queue jammed and force a reset so the
      // NEXT tap isn't blocked.
      speakWatchdog = setTimeout(() => {
        synth.cancel();
        if (resumeInterval) clearInterval(resumeInterval);
      }, 12000);
    }, 60);

  } catch (e) { /* speech not available, text still shown large on screen */ }
}

document.getElementById('replayBtn').onclick = function() {

};

/* ---------- Voice selection (automatic, no UI) ---------- */
let availableVoices = [];
let bestVoice = null;

function scoreVoice(v) {
  // Prefer higher-quality sounding voices when the platform offers a choice.
  // Names vary by OS/browser, so match on common quality markers.
  const name = (v.name || '').toLowerCase();
  let score = 0;
  if (/natural|neural|enhanced|premium|wavenet/.test(name)) score += 10;
  if (v.localService === false) score += 2; // often higher-quality network voices
  if (/google/.test(name)) score += 3;
  if (v.lang && v.lang.toLowerCase().startsWith('en')) score += 1;
  if (/female|male/.test(name)) score += 1; // named/gendered voices tend to be non-robotic defaults
  return score;
}

function populateVoiceList() {
  availableVoices = window.speechSynthesis.getVoices() || [];
  if (availableVoices.length === 0) { bestVoice = null; return; }

  let best = 0, bestScore = -1;
  availableVoices.forEach((v, i) => {
    const s = scoreVoice(v);
    if (s > bestScore) { bestScore = s; best = i; }
  });
  bestVoice = availableVoices[best];
}

function getSelectedVoice() {
  return bestVoice;
}

if ('speechSynthesis' in window) {
  populateVoiceList();
  window.speechSynthesis.onvoiceschanged = populateVoiceList;
}

function renderSpellScreen() {
  document.getElementById('screenTitle').textContent = 'Spell It Out';
  document.getElementById('backBtn').classList.toggle('visible', true);

  const app = document.getElementById('app');
  app.innerHTML = '';

  const preview = document.createElement('div');
  preview.className = 'spell-preview' + (spellBuffer ? '' : ' empty');
  preview.id = 'spellPreview';
  preview.textContent = spellBuffer || 'Tap letters to spell a word or message\u2026';
  app.appendChild(preview);

  const actions = document.createElement('div');
  actions.className = 'spell-actions';
  actions.innerHTML =
    '<button class="space-word" onclick="spellSpace()">Space</button>' +
    '<button class="speak-word" onclick="spellSpeak()">🔊 Speak</button>' +
    '<button class="clear-word" onclick="spellClear()">Clear</button>';
  app.appendChild(actions);

  const grid = document.createElement('div');
  grid.className = 'keyboard-grid';
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  letters.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'key-btn';
    btn.textContent = l;
    btn.onclick = function(){ spellAdd(l); };
    grid.appendChild(btn);
  });
  const back = document.createElement('button');
  back.className = 'key-btn backspace';
  back.textContent = '⌫ Delete';
  back.onclick = spellBackspace;
  grid.appendChild(back);
  app.appendChild(grid);
}

function spellAdd(letter) {
  spellBuffer += letter;
  updateSpellPreview();
}
function spellSpace() {
  spellBuffer += ' ';
  updateSpellPreview();
}
function spellBackspace() {
  spellBuffer = spellBuffer.slice(0, -1);
  updateSpellPreview();
}
function spellClear() {
  spellBuffer = '';
  updateSpellPreview();
}
function spellSpeak() {
  if (spellBuffer.trim().length > 0) speak(spellBuffer);
}
function updateSpellPreview() {
  const el = document.getElementById('spellPreview');
  if (!el) return;
  el.textContent = spellBuffer || 'Tap letters to spell a word or message\u2026';
  el.classList.toggle('empty', !spellBuffer);
}

function showScreen(id) {
  if (id.startsWith('ws-')) {
    renderWorksheetScreen(id);
    return;
  }
  if (id === 'spell') {
    backTarget = 'home';
    renderSpellScreen();
    window.scrollTo(0,0);
    return;
  }
  backTarget = 'home';
  const cat = categories[id];
  document.getElementById('screenTitle').textContent = cat.title;
  document.getElementById('backBtn').classList.toggle('visible', id !== 'home');
  document.getElementById('disciplineRow').style.display = (id === 'home') ? 'flex' : 'none';

  const app = document.getElementById('app');
  app.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'grid';

  const discipline = document.getElementById('disciplineSelect').value;
  const tilesToShow = (id === 'home')
    ? cat.tiles.filter(t => discipline === 'all' || !t.disciplines || t.disciplines.includes(discipline))
    : cat.tiles;

  tilesToShow.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tile' + (t.goto ? ' cat-tile ' + t.cls : '');
    btn.innerHTML = '<span class="icon">' + t.icon + '</span><span class="name">' + t.label + '</span>';
    btn.onclick = function() {
      if (t.goto) { showScreen(t.goto); }
      else { speak(t.speak); }
    };
    grid.appendChild(btn);
  });

  app.appendChild(grid);
  window.scrollTo(0,0);
}

function setFontScale(v) {
  document.documentElement.style.setProperty('--font-scale', v);
  document.querySelectorAll('.size-toggle button').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.size) === v);
  });
  localStorage.setItem('selko-voice-font-scale', v);
}
